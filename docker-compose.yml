version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: async_orch_postgres
    environment:
      POSTGRES_DB: async_orch
      POSTGRES_USER: async_orch
      POSTGRES_PASSWORD: async_orch
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: async_orch_redis
    ports:
      - "6380:6379"

volumes:
  postgres_data:
